<svg xmlns="http://www.w3.org/2000/svg"
     width="246.5" height="280" viewBox="-12 -12 197.2 224"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="apifetch">
  <title>apifetch</title>
  <defs>
    <style type="text/css">
      text { font-family: 'Jost', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22357d"/>
      <stop offset="1" stop-color="#1a2a65"/>
    </linearGradient>
  </defs>

  <!-- hexagon -->
  <path d="M100,0 L186.6,50 L186.6,150 L100,200 L13.4,150 L13.4,50 Z"
        fill="url(#hex)" stroke="#139dea" stroke-width="5" stroke-linejoin="round"/>

  <!-- fetch arrow (download = retrieve) -->
  <path d="M88,42 L112,42 L112,88 L130,88 L100,124 L70,88 L88,88 Z"
        fill="#139dea" stroke="#1a2a65" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="100" y="150" text-anchor="middle" font-weight="bold"
        fill="#ececec" font-size="30" dominant-baseline="central">apifetch</text>

  <!-- chunk swatches (BigDataPE family palette) -->
  <rect x="60"  y="167" width="16" height="16" rx="3" fill="#339e39"/>
  <rect x="82"  y="167" width="16" height="16" rx="3" fill="#f8af13"/>
  <rect x="104" y="167" width="16" height="16" rx="3" fill="#d1001e"/>
  <rect x="126" y="167" width="16" height="16" rx="3" fill="#139dea"/>
</svg>
